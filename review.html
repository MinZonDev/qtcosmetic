<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đánh Giá Khách Hàng — QT Cosmetic</title>
    <meta name="description"
        content="Xem đánh giá và feedback từ khách hàng đã sử dụng mỹ phẩm tại QT Cosmetic. Hình ảnh thực tế, review chân thực." />

    <!-- Open Graph -->
    <meta property="og:title" content="Đánh Giá Khách Hàng — QT Cosmetic" />
    <meta property="og:description" content="Xem đánh giá và feedback chân thực từ khách hàng QT Cosmetic." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="review.css" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="/" class="header__logo">
                <span class="logo-icon">✦</span> QT Cosmetic
            </a>
            <nav class="header__nav">
                <a href="index.html" class="header__nav-link">Sản phẩm</a>
                <a href="review.html" class="header__nav-link active">Đánh giá</a>
            </nav>
            <p class="header__tagline">Mỹ Phẩm Chính Hãng</p>
        </div>
    </header>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="container hero__inner">
            <h1 class="hero__title">Khách Hàng <span class="hero__accent">Nói Gì</span></h1>
            <p class="hero__subtitle">Feedback chân thực từ những khách hàng đã tin tưởng sử dụng sản phẩm tại Luxe
                Beauty</p>
        </div>
    </section>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <div class="container">

            <!-- Loading State -->
            <div class="loading" id="loading-state">
                <div class="review-skeleton-grid">
                    <div class="review-skeleton-card"></div>
                    <div class="review-skeleton-card"></div>
                    <div class="review-skeleton-card"></div>
                    <div class="review-skeleton-card"></div>
                    <div class="review-skeleton-card"></div>
                    <div class="review-skeleton-card"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="empty-state hidden" id="empty-state">
                <div class="empty-state__icon">💬</div>
                <p class="empty-state__text">Chưa có đánh giá nào.</p>
            </div>

            <!-- Review Gallery -->
            <div class="review-gallery" id="review-gallery"></div>

        </div>
    </main>

    <!-- ===== IMAGE LIGHTBOX ===== -->
    <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true">
        <button class="lightbox__close" id="lightbox-close" aria-label="Đóng">&times;</button>
        <div class="lightbox__body">
            <img class="lightbox__image" id="lightbox-image" src="" alt="" />
            <div class="lightbox__info">
                <div class="lightbox__stars" id="lightbox-stars"></div>
                <h3 class="lightbox__name" id="lightbox-name"></h3>
                <p class="lightbox__product" id="lightbox-product"></p>
                <p class="lightbox__comment" id="lightbox-comment"></p>
                <p class="lightbox__date" id="lightbox-date"></p>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p>&copy; 2026 QT Cosmetic. All rights reserved.</p>
            <p class="footer__note">Sản phẩm chính hãng 100% — Nhập khẩu trực tiếp</p>
        </div>
    </footer>

    <!-- Review Script -->
    <script src="review.js"></script>
</body>

</html>
