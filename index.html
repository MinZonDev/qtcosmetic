<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QT Cosmetic — Mỹ Phẩm Chính Hãng</title>
    <meta name="description"
        content="Khám phá bộ sưu tập mỹ phẩm chính hãng từ các thương hiệu hàng đầu. Skincare, Makeup, Nước hoa cao cấp với giá tốt nhất." />

    <!-- Open Graph -->
    <meta property="og:title" content="QT Cosmetic — Mỹ Phẩm Chính Hãng" />
    <meta property="og:description" content="Khám phá bộ sưu tập mỹ phẩm chính hãng từ các thương hiệu hàng đầu." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="/" class="header__logo">
                <span class="logo-icon">✦</span> QT Cosmetic
            </a>
            <nav class="header__nav">
                <a href="index.html" class="header__nav-link active">Sản phẩm</a>
                <a href="review.html" class="header__nav-link">Đánh giá</a>
            </nav>
            <p class="header__tagline">Mỹ Phẩm Chính Hãng</p>
        </div>
    </header>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="container hero__inner">
            <h1 class="hero__title">Tỏa Sáng Với Vẻ Đẹp <span class="hero__accent">Đích Thực</span></h1>
            <p class="hero__subtitle">Bộ sưu tập mỹ phẩm cao cấp từ các thương hiệu hàng đầu</p>
        </div>
    </section>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <div class="container">

            <!-- Category Filters (rendered dynamically by JS) -->
            <nav class="filters" id="category-filters" aria-label="Lọc theo danh mục">
                <!-- Buttons sẽ được tạo từ dữ liệu thực tế -->
            </nav>

            <!-- Loading State -->
            <div class="loading" id="loading-state">
                <div class="skeleton-grid">
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text short"></div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="empty-state hidden" id="empty-state">
                <div class="empty-state__icon">🔍</div>
                <p class="empty-state__text">Không tìm thấy sản phẩm nào.</p>
            </div>

            <!-- Product Grid -->
            <div class="product-grid" id="product-grid"></div>

            <!-- Load More -->
            <div class="load-more hidden" id="load-more-container">
                <p class="load-more__count" id="product-count"></p>
                <div class="load-more__actions">
                    <button class="load-more__btn" id="load-more-btn">Xem thêm sản phẩm</button>
                    <button class="load-more__btn load-more__btn--ghost hidden" id="collapse-btn">Thu gọn ▲</button>
                </div>
            </div>

        </div>
    </main>

    <!-- ===== PRODUCT MODAL ===== -->
    <div class="modal-overlay" id="product-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal">
            <button class="modal__close" id="modal-close" aria-label="Đóng">&times;</button>
            <div class="modal__body">
                <div class="modal__image-wrapper">
                    <img class="modal__image" id="modal-image" src="" alt="" />
                </div>
                <div class="modal__info">
                    <span class="modal__badge" id="modal-category"></span>
                    <span class="modal__status" id="modal-status"></span>
                    <h2 class="modal__title" id="modal-title"></h2>
                    <p class="modal__brand" id="modal-brand"></p>
                    <p class="modal__price" id="modal-price"></p>
                    <div class="modal__divider"></div>
                    <p class="modal__description" id="modal-description"></p>
                    <a class="modal__cta" id="modal-cta" href="#" target="_blank" rel="noopener noreferrer">
                        💬 Liên hệ mua hàng
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p>&copy; 2026 QT Cosmetic. All rights reserved.</p>
            <p class="footer__note">Sản phẩm chính hãng 100%</p>
        </div>
    </footer>

    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
